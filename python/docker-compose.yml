version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: winplus_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-winplus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-winplus_password}
      POSTGRES_DB: ${DB_NAME:-winplus_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-winplus_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: winplus_fastapi
    environment:
      DATABASE_URL: postgresql://${DB_USER:-winplus_user}:${DB_PASSWORD:-winplus_password}@postgres:5432/${DB_NAME:-winplus_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 8000
      # DeepSeek
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-http://localhost:8000}
      # NLP Models
      NLP_MODEL: ${NLP_MODEL:-camembert-base}
      MODEL_CACHE_DIR: ./models_cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./models_cache:/app/models_cache
      - ./logs:/app/logs
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 10 &&
        echo 'Starting FastAPI application...' &&
        uvicorn app:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: winplus_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: winplus_network
